let calView='month',calDate=new Date(),calSelectedDate=todayKey();

function calGetItemsForDate(ds){
  const deletedIds=getDeletedIds();
  const d=new Date(ds+'T12:00');
  const dow=d.getDay();
  const items=[];
  function addIfMatch(x,type){
    if(!x||deletedIds.has(x.id))return;
    if(type==='event'&&(x.examId||x.hwId))return;
    const n=normalizeItem(x,type);
    if(!n.recur){
      if(n.date===ds)items.push(n);
    }else{
      const r=n.recur;
      if(!r.start||ds<r.start)return;
      if(r.until&&ds>r.until)return;
      if(r.exceptions&&r.exceptions.includes(ds))return;
      if(r.freq==='daily'){items.push({...n,date:ds});return;}
      if(r.freq==='monthly'){const sd=new Date(r.start+'T12:00');if(d.getDate()===sd.getDate())items.push({...n,date:ds});return;}
      const chk=r.freq==='weekdays'?[1,2,3,4,5]:(r.days&&r.days.length?r.days:[new Date(r.start+'T12:00').getDay()]);
      if(chk.includes(dow))items.push({...n,date:ds});
    }
  }
  getTypedList('rem').forEach(x=>addIfMatch(x,'rem'));
  getTypedList('hw').forEach(x=>addIfMatch(x,'hw'));
  getTypedList('exam').forEach(x=>addIfMatch(x,'exam'));
  getTypedList('event').forEach(x=>addIfMatch(x,'event'));
  return items;
}
function calGetDotTypes(ds){return[...new Set(calGetItemsForDate(ds).map(x=>x.type))];}

function calRenderDayItems(ds){
  const items=calGetItemsForDate(ds);
  if(!items.length){
    const isPast=ds<todayKey();
    return`<div class="cal-empty">${isPast?'Nothing on this day':'Nothing scheduled'}</div>`;
  }
  return items.map(item=>{
    const m=TYPE_META[item.type]||TYPE_META.rem;
    const subj=item.subject?`<span>${escHtml(item.subject)}</span>`:'';
    return`<div class="cal-item-row">
      <div class="cal-item-accent" style="background:${m.color}"></div>
      <div class="cal-item-body">
        <div class="cal-item-title">${escHtml(item.title)}</div>
        <div class="cal-item-meta"><span class="item-pill ${m.pill}" style="font-size:8.5px">${m.label}</span>${subj}</div>
      </div>
    </div>`;
  }).join('');
}

function calRenderMonth(){
  const y=calDate.getFullYear(),mo=calDate.getMonth();
  const firstDay=new Date(y,mo,1).getDay();
  const daysInMonth=new Date(y,mo+1,0).getDate();
  const today=todayKey();
  const mNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  let html=`<div class="cal-nav-row">
    <button class="cal-nav-btn" onclick="calNav(-1)"><svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg></button>
    <div class="cal-period-lbl">${mNames[mo]} ${y}</div>
    <button class="cal-nav-btn" onclick="calNav(1)"><svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg></button>
  </div>
  <div class="cal-weekdays"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div>
  <div class="cal-grid">`;
  for(let i=0;i<firstDay;i++)html+=`<div class="cal-day-cell empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dots=calGetDotTypes(ds).slice(0,3).map(t=>`<span class="cal-dot-${t}"></span>`).join('');
    html+=`<div class="cal-day-cell${ds===today?' cal-today':''}${ds===calSelectedDate?' cal-selected':''}" onclick="calSelectDay('${ds}')">
      <span class="cal-day-num">${d}</span>
      <div class="cal-day-dots">${dots}</div>
    </div>`;
  }
  html+=`</div>`;
  // Selected day items
  const selDate=new Date(calSelectedDate+'T12:00:00');
  const dNames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const mAbbr=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  html+=`<div class="cal-day-hd">${dNames[selDate.getDay()]}, ${mAbbr[selDate.getMonth()]} ${selDate.getDate()}</div>${calRenderDayItems(calSelectedDate)}`;
  return html;
}

function calRenderWeek(){
  const ws=new Date(calDate);ws.setDate(ws.getDate()-ws.getDay());
  const we=new Date(ws);we.setDate(we.getDate()+6);
  const today=todayKey();
  const mAbbr=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const rangeLabel=ws.getMonth()===we.getMonth()?`${mAbbr[ws.getMonth()]} ${ws.getDate()}–${we.getDate()}, ${ws.getFullYear()}`:`${mAbbr[ws.getMonth()]} ${ws.getDate()} – ${mAbbr[we.getMonth()]} ${we.getDate()}`;
  let html=`<div class="cal-nav-row">
    <button class="cal-nav-btn" onclick="calNav(-1)"><svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg></button>
    <div class="cal-period-lbl">${rangeLabel}</div>
    <button class="cal-nav-btn" onclick="calNav(1)"><svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg></button>
  </div><div class="cal-week-strip">`;
  for(let i=0;i<7;i++){
    const d=new Date(ws);d.setDate(d.getDate()+i);
    const ds=localDateStr(d);
    const dots=calGetDotTypes(ds).slice(0,3).map(t=>`<span class="cal-dot-${t}"></span>`).join('');
    html+=`<div class="cal-week-day${ds===today?' cal-today':''}${ds===calSelectedDate?' cal-selected':''}" onclick="calSelectDay('${ds}')">
      <span class="cal-wd-name">${dNames[d.getDay()]}</span>
      <span class="cal-wd-num">${d.getDate()}</span>
      <div class="cal-day-dots">${dots}</div>
    </div>`;
  }
  html+=`</div>`;
  const selDate=new Date(calSelectedDate+'T12:00:00');
  const dFullNames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  html+=`<div class="cal-day-hd">${dFullNames[selDate.getDay()]}, ${mAbbr[selDate.getMonth()]} ${selDate.getDate()}</div>${calRenderDayItems(calSelectedDate)}`;
  return html;
}

function calRenderDay(){
  const d=new Date(calSelectedDate+'T12:00:00');
  const dNames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const mAbbr=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return`<div class="cal-nav-row">
    <button class="cal-nav-btn" onclick="calNavDay(-1)"><svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg></button>
    <div class="cal-period-lbl">${dNames[d.getDay()]}, ${mAbbr[d.getMonth()]} ${d.getDate()}</div>
    <button class="cal-nav-btn" onclick="calNavDay(1)"><svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg></button>
  </div>${calRenderDayItems(calSelectedDate)}`;
}

function renderCalPage(){
  const c=document.getElementById('cal-content');if(!c)return;
  if(calView==='month')c.innerHTML=calRenderMonth();
  else if(calView==='week')c.innerHTML=calRenderWeek();
  else c.innerHTML=calRenderDay();
}

function calSetView(v){
  calView=v;
  document.querySelectorAll('.cal-tab').forEach(t=>t.classList.remove('act'));
  const tab=document.getElementById('cal-tab-'+v);if(tab)tab.classList.add('act');
  renderCalPage();
}

function calNav(dir){
  if(calView==='month'){
    const d=new Date(calDate);d.setDate(1);d.setMonth(d.getMonth()+dir);calDate=d;
  }else{
    const d=new Date(calDate);d.setDate(d.getDate()+dir*7);calDate=d;
    calSelectedDate=localDateStr(d);
  }
  renderCalPage();
}

function calNavDay(dir){
  const d=new Date(calSelectedDate+'T12:00:00');d.setDate(d.getDate()+dir);
  calSelectedDate=localDateStr(d);calDate=new Date(d);
  renderCalPage();
}

function calSelectDay(ds){
  calSelectedDate=ds;
  const d=new Date(ds+'T12:00:00');calDate=new Date(d);
  if(calView==='day')renderCalPage();
  else{
    // Re-render just the selected state + day items without rebuilding the whole calendar
    renderCalPage();
  }
}

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
async function init(){
  updateGreeting();
  renderFeed();
  renderCalPage();
  ftRender();
  renderStudyLog();
  ppRenderList();

  // Keyboard: Enter submits add form
  document.getElementById('f-title').addEventListener('keydown',e=>{if(e.key==='Enter')saveItem();});
  document.getElementById('auth-email').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('auth-pass').focus();});
  document.getElementById('auth-pass').addEventListener('keydown',e=>{if(e.key==='Enter')authSubmit();});

  // Page swipe gesture (horizontal swipe to navigate pages)
  let _psStart=null,_psActive=false;
  const appEl=document.getElementById('app');
  appEl.addEventListener('touchstart',e=>{
    if(e.target.closest('.item-card,#add-sheet,#auth-sheet,#dock,#fab'))return;
    _psStart={x:e.touches[0].clientX,y:e.touches[0].clientY,idx:curPageIdx};
    _psActive=false;
  },{passive:true});
  appEl.addEventListener('touchmove',e=>{
    if(!_psStart)return;
    const dx=e.touches[0].clientX-_psStart.x,dy=e.touches[0].clientY-_psStart.y;
    if(!_psActive){
      if(Math.abs(dy)>Math.abs(dx)+6){_psStart=null;return;}
      if(Math.abs(dx)>10)_psActive=true;else return;
    }
    e.preventDefault();
    const wrap=document.getElementById('pages-wrap');
    wrap.style.transition='none';
    wrap.style.transform=`translateX(calc(-${_psStart.idx*25}% + ${dx}px))`;
    wrap.style.filter=`blur(${Math.min(Math.abs(dx)/55,2.5)}px)`;
  },{passive:false});
  appEl.addEventListener('touchend',e=>{
    if(!_psStart||!_psActive){_psStart=null;_psActive=false;return;}
    const dx=e.changedTouches[0].clientX-_psStart.x;
    const wrap=document.getElementById('pages-wrap');
    wrap.style.filter='';wrap.style.transition='';
    const thr=window.innerWidth*0.22;
    let ni=_psStart.idx;
    if(dx<-thr&&ni<PAGES.length-1)ni++;
    else if(dx>thr&&ni>0)ni--;
    _psStart=null;_psActive=false;
    goPage(PAGES[ni]);
  },{passive:true});

  // Sheet drag-to-close
  [['add-sheet',closeSheet],['auth-sheet',closeAuth]].forEach(([id,closer])=>{
    const sheet=document.getElementById(id);let dragY=null;
    sheet.addEventListener('touchstart',e=>{if(e.target.closest('input,button,select'))return;dragY=e.touches[0].clientY;},{passive:true});
    sheet.addEventListener('touchmove',e=>{if(dragY===null)return;const dy=e.touches[0].clientY-dragY;if(dy>0)sheet.style.transform=`translateY(${dy}px)`;},{passive:true});
    sheet.addEventListener('touchend',e=>{if(dragY===null)return;const dy=e.changedTouches[0].clientY-dragY;sheet.style.transform='';if(dy>80)closer();dragY=null;});
  });

  // Restore session
  const sess=await sbGetSession();
  if(sess){
    sbAuthToken=sess.access_token;sbUserId=sess.user?.id;
    setSyncStatus(true,sess.user?.email);
    sbStartAutoSync();
    await _sbReplayDirty();
    await sbPushMissing();
    await sbSilentPull();
    lbFetchFriendsFromServer();
  }
}
document.addEventListener('DOMContentLoaded',init);
</script>
