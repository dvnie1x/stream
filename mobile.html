<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script>
(function(){
  var ua=navigator.userAgent;
  var isPhone=/iPhone/i.test(ua)||(/Android/i.test(ua)&&/Mobile/i.test(ua));
  var isNarrow=window.innerWidth<=768;
  if(!isPhone&&!isNarrow)window.location.replace('index.html');
  if(localStorage.getItem('sm_night')==='1')document.documentElement.classList.add('night');
})();
</script>
<title>stream. companion</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f0f1f5" id="tc-meta">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="stream.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23f2f3f6'/><text x='8' y='24' font-family='Arial,sans-serif' font-size='22' font-weight='700' fill='%230f0f0f'>s</text><circle cx='25.5' cy='22' r='3' fill='%236366f1'/></svg>">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@200;300;400;500;600;700;800;900&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#eeeff4;--card:#ffffff;--card2:rgba(255,255,255,.7);
  --text:#0d0d12;--t2:#6b6b78;--t3:#a8a8b4;
  --border:rgba(0,0,0,.07);--border-s:rgba(0,0,0,.13);
  --sh:0 2px 12px rgba(0,0,0,.055),0 1px 0 rgba(255,255,255,.8) inset;
  --sh-dock:0 8px 36px rgba(0,0,0,.13),0 2px 0 rgba(255,255,255,.9) inset;
  --r:16px;
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
  --c-rem:#6366f1;--c-hw:#8b5cf6;--c-exam:#ef4444;--c-event:#14b8a6;
}
.night{
  --bg:#0b0c13;--card:#131521;--card2:rgba(19,21,33,.7);
  --text:#f0f0f2;--t2:#9898a4;--t3:#5a5a6a;
  --border:rgba(255,255,255,.07);--border-s:rgba(255,255,255,.13);
  --sh:0 2px 14px rgba(0,0,0,.4),0 1px 0 rgba(255,255,255,.04) inset;
  --sh-dock:0 8px 40px rgba(0,0,0,.55);
}
html,body{height:100%;overflow:hidden}
body{font-family:'Geist',sans-serif;font-size:14px;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;transition:background .35s,color .35s}

/* BG ORBS */
#bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(70px)}
.orb-a{width:320px;height:320px;background:rgba(99,102,241,.10);top:-80px;right:-80px;animation:oa 13s ease-in-out infinite}
.orb-b{width:260px;height:260px;background:rgba(139,92,246,.07);bottom:35%;left:-100px;animation:ob 17s ease-in-out infinite}
.orb-c{width:200px;height:200px;background:rgba(20,184,166,.06);bottom:-50px;right:20%;animation:oc 15s ease-in-out infinite}
.night .orb-a{background:rgba(99,102,241,.18)}.night .orb-b{background:rgba(139,92,246,.13)}.night .orb-c{background:rgba(20,184,166,.10)}
@keyframes oa{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-28px,22px) scale(1.08)}}
@keyframes ob{0%,100%{transform:translate(0,0)}55%{transform:translate(22px,-28px)}}
@keyframes oc{0%,100%{transform:translate(0,0)}60%{transform:translate(-14px,18px)}}

/* SHELL */
#app{position:fixed;inset:0;z-index:1;overflow:hidden}

/* HEADER */
#app-header{position:fixed;top:0;left:0;right:0;z-index:100;padding:calc(var(--safe-t) + 14px) 18px 14px;display:flex;align-items:center;justify-content:space-between;background:var(--bg);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);transition:background .35s}
.app-logo{font-size:16px;font-weight:700;letter-spacing:-.028em;color:var(--text);display:flex;align-items:baseline;gap:5px}
.app-logo-dot{color:#6366f1}
.companion-tag{font-size:9px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--t3);font-family:'Geist Mono',monospace;opacity:.75}
.header-actions{display:flex;align-items:center;gap:6px}
.hdr-btn{width:32px;height:32px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--t2);box-shadow:var(--sh);transition:all .16s;-webkit-tap-highlight-color:transparent}
.hdr-btn:active{transform:scale(.88)}
.hdr-sync-dot{width:7px;height:7px;border-radius:50%;background:var(--t3);transition:background .3s}
.hdr-sync-dot.on{background:#16a34a}

/* PAGES — horizontal carousel */
#pages-wrap{display:flex;width:400%;height:100%;transform:translateX(0);transition:transform .38s cubic-bezier(.4,0,.2,1);will-change:transform}
.page{width:25%;flex-shrink:0;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-top:calc(var(--safe-t) + 76px);padding-bottom:calc(var(--safe-b) + 106px);padding-left:20px;padding-right:20px}

/* DOCK — symmetric 4-button: [Home][Focus][FAB gap][Cal][Board] */
#dock{position:fixed;bottom:calc(var(--safe-b) + 14px);left:50%;transform:translateX(-50%);width:calc(100% - 40px);max-width:360px;height:62px;background:rgba(252,252,254,.92);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border:1px solid rgba(255,255,255,.95);border-radius:22px;box-shadow:var(--sh-dock);display:flex;align-items:center;padding:0 6px;z-index:100;gap:0}
.night #dock{background:rgba(14,15,22,.92);border-color:rgba(255,255,255,.09)}
.dock-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 4px;border-radius:14px;color:var(--t3);border:none;background:transparent;transition:all .2s cubic-bezier(.34,1.3,.64,1);-webkit-tap-highlight-color:transparent}
.dock-btn.act{color:var(--text);background:rgba(0,0,0,.058)}
.night .dock-btn.act{background:rgba(255,255,255,.10)}
.dock-btn svg{width:20px;height:20px;opacity:.48;transition:all .2s}
.dock-btn.act svg{opacity:1;transform:scale(1.06)}
.dock-lbl{font-size:9px;font-weight:500;letter-spacing:.022em;opacity:.5;transition:opacity .2s}
.dock-btn.act .dock-lbl{opacity:1}

/* FAB */
#fab{position:fixed;bottom:calc(var(--safe-b) + 21px);left:50%;transform:translateX(-50%);width:50px;height:50px;background:var(--text);color:var(--bg);border-radius:16px;border:none;font-size:24px;font-weight:300;line-height:1;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 22px rgba(0,0,0,.24);z-index:101;transition:transform .2s cubic-bezier(.34,1.5,.64,1),background .2s;-webkit-tap-highlight-color:transparent}
#fab:active{transform:translateX(-50%) scale(.88)}
#fab.open{transform:translateX(-50%) rotate(45deg)}

/* HOME PAGE */
.home-greeting{margin-bottom:30px}
.greet-eyebrow{font-size:10.5px;font-family:'Geist Mono',monospace;text-transform:uppercase;letter-spacing:.13em;color:var(--t3);margin-bottom:7px}
.greet-text{font-size:30px;font-weight:300;letter-spacing:-.03em;color:var(--text);line-height:1.15}
.greet-sub{margin-top:7px;font-size:12px;color:var(--t3);font-family:'Geist Mono',monospace}

/* Section headers */
.sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px;margin-top:26px}
.sec-hd:first-child{margin-top:0}
.sec-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sec-dot.overdue{background:#ef4444}.sec-dot.today{background:#6366f1}.sec-dot.soon{background:#f59e0b}.sec-dot.later,.sec-dot.none{background:var(--t3)}
.sec-label{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--t3);font-family:'Geist Mono',monospace}
.sec-count{margin-left:auto;font-size:10.5px;color:var(--t3);font-family:'Geist Mono',monospace}

/* Item cards */
.item-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;box-shadow:var(--sh);overflow:hidden;display:flex;align-items:stretch;position:relative;transition:transform .15s,opacity .2s;-webkit-tap-highlight-color:transparent;touch-action:pan-y}
.item-card:active{transform:scale(.985)}
.item-card.done{opacity:.4}
.item-card.done .item-title{text-decoration:line-through;color:var(--t3)}
.item-card::after{content:'';position:absolute;inset:0;background:rgba(239,68,68,.12);opacity:0;transition:opacity .15s;pointer-events:none;border-radius:var(--r)}
.item-card.swiping::after{opacity:1}
.item-accent{width:4px;flex-shrink:0}
.acc-rem{background:var(--c-rem)}.acc-hw{background:var(--c-hw)}.acc-exam{background:var(--c-exam)}.acc-event{background:var(--c-event)}
.item-body{flex:1;padding:13px 14px 12px;min-width:0}
.item-title{font-size:14.5px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;margin-bottom:4px}
.item-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;font-size:11px;color:var(--t3);font-family:'Geist Mono',monospace}
.item-pill{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;padding:2px 8px;border-radius:20px;color:#fff;opacity:.85}
.pill-rem{background:var(--c-rem)}.pill-hw{background:var(--c-hw)}.pill-exam{background:var(--c-exam)}.pill-event{background:var(--c-event)}
.item-check{width:48px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--t3);border:none;background:transparent;transition:color .15s,transform .15s;-webkit-tap-highlight-color:transparent}
.item-check:active{transform:scale(.82)}
.item-card.done .item-check{color:var(--c-event)}

/* Empty state */
.empty-wrap{display:flex;flex-direction:column;align-items:center;padding:56px 20px 24px;text-align:center;gap:10px}
.empty-ring{width:64px;height:64px;border-radius:50%;border:1.5px dashed var(--border-s);display:flex;align-items:center;justify-content:center;color:var(--t3);margin-bottom:4px}
.empty-title{font-size:15px;font-weight:500;color:var(--t2)}
.empty-sub{font-size:12.5px;color:var(--t3);line-height:1.6}

/* Done items */
.done-toggle{display:flex;align-items:center;gap:8px;font-size:11px;font-family:'Geist Mono',monospace;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-top:24px;padding:10px 0;border-top:1px solid var(--border);-webkit-tap-highlight-color:transparent;transition:color .15s}
.done-toggle:active{color:var(--t2)}
.done-toggle svg{opacity:.5}
#done-items{margin-top:8px}

/* TYPE SECTIONS (home feed) */
.type-section{margin-bottom:4px}
.type-sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px;margin-top:26px}
.type-section:first-child .type-sec-hd{margin-top:0}
.type-sec-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.type-sec-label{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--t3);font-family:'Geist Mono',monospace}

/* CALENDAR PAGE */
.cal-tabs{display:flex;background:rgba(0,0,0,.05);border-radius:12px;padding:3px;margin-bottom:20px;gap:2px}
.night .cal-tabs{background:rgba(255,255,255,.07)}
.cal-tab{flex:1;padding:9px;border-radius:9px;font-size:13px;font-weight:500;color:var(--t3);background:transparent;border:none;font-family:'Geist',sans-serif;transition:all .18s;-webkit-tap-highlight-color:transparent}
.cal-tab.act{background:var(--card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.night .cal-tab.act{box-shadow:0 2px 8px rgba(0,0,0,.36)}
.cal-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-nav-btn{width:32px;height:32px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--t2);box-shadow:var(--sh);-webkit-tap-highlight-color:transparent;transition:all .13s}
.cal-nav-btn:active{transform:scale(.88)}
.cal-period-lbl{font-size:15px;font-weight:600;letter-spacing:-.02em;color:var(--text)}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.cal-weekdays span{text-align:center;font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);font-family:'Geist Mono',monospace;padding:3px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:18px}
.cal-day-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .14s}
.cal-day-cell.empty{pointer-events:none}
.cal-day-num{font-size:13px;font-weight:500;color:var(--text);line-height:1}
.cal-day-cell.cal-today .cal-day-num{color:#6366f1;font-weight:700}
.cal-day-cell.cal-selected{background:var(--text)}
.cal-day-cell.cal-selected .cal-day-num{color:var(--bg)}
.cal-day-cell.cal-today.cal-selected{background:#6366f1}
.cal-day-cell.cal-today.cal-selected .cal-day-num{color:#fff}
.cal-day-dots{display:flex;gap:2px;justify-content:center;margin-top:2px;min-height:5px}
.cal-dot-rem,.cal-dot-hw,.cal-dot-exam,.cal-dot-event{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.cal-dot-rem{background:var(--c-rem)}.cal-dot-hw{background:var(--c-hw)}.cal-dot-exam{background:var(--c-exam)}.cal-dot-event{background:var(--c-event)}
.cal-day-cell.cal-selected .cal-dot-rem,.cal-day-cell.cal-selected .cal-dot-hw,.cal-day-cell.cal-selected .cal-dot-exam,.cal-day-cell.cal-selected .cal-dot-event{background:var(--bg);opacity:.65}
.cal-week-strip{display:flex;gap:5px;margin-bottom:16px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.cal-week-strip::-webkit-scrollbar{display:none}
.cal-week-day{flex:1;min-width:38px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 3px;border-radius:12px;background:var(--card);border:1px solid var(--border);box-shadow:var(--sh);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .14s}
.cal-week-day.cal-today .cal-wd-num{color:#6366f1;font-weight:700}
.cal-week-day.cal-selected{background:var(--text);border-color:var(--text)}
.cal-week-day.cal-selected .cal-wd-name,.cal-week-day.cal-selected .cal-wd-num{color:var(--bg)}
.cal-week-day.cal-selected .cal-dot-rem,.cal-week-day.cal-selected .cal-dot-hw,.cal-week-day.cal-selected .cal-dot-exam,.cal-week-day.cal-selected .cal-dot-event{background:var(--bg);opacity:.65}
.cal-wd-name{font-size:8.5px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);font-family:'Geist Mono',monospace}
.cal-wd-num{font-size:16px;font-weight:600;color:var(--text)}
.cal-day-hd{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--t3);font-family:'Geist Mono',monospace;margin:16px 0 10px;padding-top:16px;border-top:1px solid var(--border)}
.cal-item-row{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;box-shadow:var(--sh);display:flex;align-items:stretch;overflow:hidden}
.cal-item-accent{width:4px;flex-shrink:0}
.cal-item-body{flex:1;padding:11px 14px 10px;min-width:0}
.cal-item-title{font-size:14px;font-weight:500;color:var(--text);line-height:1.3;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-item-meta{display:flex;align-items:center;gap:6px;font-size:10.5px;color:var(--t3);font-family:'Geist Mono',monospace;flex-wrap:wrap}
.cal-empty{text-align:center;padding:36px 20px;font-size:12.5px;color:var(--t3);font-family:'Geist Mono',monospace}

/* ADD SHEET */
#sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:200;pointer-events:none;transition:background .28s}
#sheet-overlay.open{background:rgba(0,0,0,.38);pointer-events:auto}
.night #sheet-overlay.open{background:rgba(0,0,0,.58)}
#add-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:24px 24px 0 0;border:1px solid var(--border);border-bottom:none;z-index:201;transform:translateY(100%);transition:transform .34s cubic-bezier(.34,1.08,.64,1);padding:0 22px calc(var(--safe-b) + 24px);max-height:92vh;overflow-y:auto}
#add-sheet.open{transform:translateY(0)}
.sheet-handle{width:34px;height:4px;border-radius:2px;background:var(--border-s);margin:12px auto 22px}
.sheet-step{display:none}
.sheet-step.act{display:block}
.sheet-heading{font-size:20px;font-weight:700;letter-spacing:-.028em;color:var(--text);margin-bottom:22px}
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.type-btn{height:88px;border-radius:18px;border:1.5px solid var(--border);background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--t2);transition:all .2s cubic-bezier(.34,1.4,.64,1);-webkit-tap-highlight-color:transparent}
.type-btn svg{width:24px;height:24px}
.type-btn-lbl{font-size:12.5px;font-weight:600;letter-spacing:.01em}
.type-btn.sel{color:#fff;border-width:2px}
.tb-rem.sel{background:var(--c-rem);border-color:var(--c-rem)}.tb-hw.sel{background:var(--c-hw);border-color:var(--c-hw)}.tb-exam.sel{background:var(--c-exam);border-color:var(--c-exam)}.tb-event.sel{background:var(--c-event);border-color:var(--c-event)}
.field-row{margin-bottom:14px}
.field-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--t3);font-family:'Geist Mono',monospace;display:block;margin-bottom:6px}
.field-inp,.field-sel{width:100%;padding:13px 14px;background:var(--bg);border:1px solid var(--border);border-radius:12px;font-family:'Geist',sans-serif;font-size:15px;color:var(--text);outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none}
.field-inp:focus,.field-sel:focus{border-color:rgba(99,102,241,.5)}
.field-inp::placeholder{color:var(--t3)}
.back-row{display:flex;align-items:center;gap:8px;margin-bottom:20px;color:var(--t3);font-size:13px;-webkit-tap-highlight-color:transparent}
.back-row:active{color:var(--t2)}
.type-indicator{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.save-btn{width:100%;height:52px;border:none;border-radius:14px;margin-top:8px;font-family:'Geist',sans-serif;font-size:15px;font-weight:600;color:#fff;background:var(--c-rem);transition:all .15s;-webkit-tap-highlight-color:transparent}
.save-btn:active{transform:scale(.97)}

/* FOCUS PAGE */
.focus-page-hd{margin-bottom:28px}
.focus-page-title{font-size:30px;font-weight:700;letter-spacing:-.03em;margin-bottom:3px}
.focus-page-sub{font-size:12px;color:var(--t3);font-family:'Geist Mono',monospace}
.focus-tabs{display:flex;background:rgba(0,0,0,.05);border-radius:12px;padding:3px;margin-bottom:36px;gap:2px}
.night .focus-tabs{background:rgba(255,255,255,.07)}
.focus-tab{flex:1;padding:9px;border-radius:9px;font-size:13.5px;font-weight:500;color:var(--t3);background:transparent;border:none;font-family:'Geist',sans-serif;transition:all .18s;-webkit-tap-highlight-color:transparent}
.focus-tab.act{background:var(--card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.night .focus-tab.act{box-shadow:0 2px 8px rgba(0,0,0,.36)}
.focus-panel{display:none;flex-direction:column;align-items:center}
.focus-panel.act{display:flex}
.sw-time-display{font-family:'Geist Mono',monospace;font-size:78px;font-weight:200;letter-spacing:-.04em;color:var(--text);line-height:1;font-variant-numeric:tabular-nums;text-align:center;margin-bottom:8px}
.sw-cs{font-size:46px;opacity:.28;font-weight:200}
.sw-status-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.16em;color:var(--t3);font-family:'Geist Mono',monospace;margin-bottom:40px;height:16px}
.sw-btns{display:flex;gap:10px;margin-bottom:24px}
.sw-btn{height:52px;border-radius:50px;border:none;font-size:15px;font-weight:500;font-family:'Geist',sans-serif;transition:transform .13s;-webkit-tap-highlight-color:transparent}
.sw-btn:active{transform:scale(.92)}
.sw-primary{background:var(--text);color:var(--bg);padding:0 38px;min-width:130px}
.sw-secondary{background:rgba(0,0,0,.06);color:var(--t2);padding:0 24px}
.night .sw-secondary{background:rgba(255,255,255,.10)}
.laps-list{width:100%;max-height:220px;overflow-y:auto}
.lap-row{display:flex;justify-content:space-between;align-items:center;padding:12px 2px;border-bottom:1px solid var(--border)}
.lap-row:first-child{border-top:1px solid var(--border)}
.lap-n{font-size:12.5px;color:var(--t3);font-family:'Geist Mono',monospace}
.lap-t{font-size:14px;color:var(--text);font-family:'Geist Mono',monospace;font-weight:500}
.ring-outer{position:relative;width:200px;height:200px;margin:0 auto 28px}
.ring-svg{position:absolute;inset:0;width:100%;height:100%}
.ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-time{font-family:'Geist Mono',monospace;font-size:38px;font-weight:200;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:-.015em}
.ring-lbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.14em;color:var(--t3);font-family:'Geist Mono',monospace;margin-top:4px}
.dur-row{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:24px}
.dur-step{width:42px;height:42px;border-radius:50%;background:rgba(0,0,0,.06);border:none;font-size:17px;color:var(--t2);display:flex;align-items:center;justify-content:center;font-family:'Geist Mono',monospace;transition:all .12s;-webkit-tap-highlight-color:transparent}
.night .dur-step{background:rgba(255,255,255,.10)}
.dur-step:active{transform:scale(.84)}
.dur-val{font-size:20px;font-weight:500;color:var(--text);font-family:'Geist Mono',monospace;min-width:72px;text-align:center}
.focus-cta{width:100%;height:52px;border:none;border-radius:14px;font-family:'Geist',sans-serif;font-size:15px;font-weight:600;background:var(--text);color:var(--bg);transition:all .14s;-webkit-tap-highlight-color:transparent;margin-bottom:12px}
.focus-cta:active{transform:scale(.97)}
.focus-fs{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;height:46px;border:1px solid var(--border);border-radius:12px;background:transparent;font-family:'Geist',sans-serif;font-size:13px;color:var(--t3);transition:all .14s;-webkit-tap-highlight-color:transparent}
.focus-fs:active{background:rgba(0,0,0,.04)}
.night .focus-fs:active{background:rgba(255,255,255,.05)}

/* STUDY LOG + PAPERS */
.focus-log-hd{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--t3);font-family:'Geist Mono',monospace;margin:28px 0 12px;padding-top:20px;border-top:1px solid var(--border)}
.log-row{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:6px;box-shadow:var(--sh)}
.log-mins{font-size:16px;font-weight:700;font-family:'Geist Mono',monospace;color:var(--text);min-width:44px}
.log-subj{flex:1;font-size:13px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-date{font-size:10px;color:var(--t3);font-family:'Geist Mono',monospace;flex-shrink:0}
.paper-row{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;box-shadow:var(--sh);display:flex;align-items:center;gap:0;overflow:hidden}
.paper-pct-bar{width:5px;flex-shrink:0;align-self:stretch}
.paper-body{flex:1;padding:12px 14px 11px;min-width:0}
.paper-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.paper-meta{font-size:11px;color:var(--t3);font-family:'Geist Mono',monospace}
.paper-pct{font-size:20px;font-weight:700;font-family:'Geist Mono',monospace;padding:0 16px 0 8px;flex-shrink:0}
.paper-pct.great{color:#16a34a}.paper-pct.ok{color:#f59e0b}.paper-pct.low{color:#ef4444}
.sw-log-btn{height:44px;border:none;border-radius:12px;font-family:'Geist',sans-serif;font-size:14px;font-weight:600;background:rgba(99,102,241,.12);color:#6366f1;padding:0 24px;-webkit-tap-highlight-color:transparent;transition:all .14s;margin-top:8px}
.sw-log-btn:active{transform:scale(.95)}
.night .sw-log-btn{background:rgba(99,102,241,.18)}

/* LEADERBOARD PAGE */
.lb-section{margin-bottom:28px}
.lb-section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--t3);font-family:'Geist Mono',monospace;margin-bottom:12px}
.lb-my-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh);margin-bottom:8px}
.lb-my-username{font-size:18px;font-weight:700;letter-spacing:-.02em;margin-bottom:2px}
.lb-my-username span{color:var(--t3);font-weight:400}
.lb-my-stats{display:flex;gap:20px;margin-top:12px}
.lb-stat{display:flex;flex-direction:column;gap:2px}
.lb-stat-val{font-size:20px;font-weight:700;letter-spacing:-.02em;font-family:'Geist Mono',monospace}
.lb-stat-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;font-family:'Geist Mono',monospace}
.lb-claim-form{display:flex;gap:8px;margin-top:8px}
.lb-claim-input{flex:1;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:12px;font-family:'Geist',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none}
.lb-claim-input:focus{border-color:rgba(99,102,241,.5)}
.lb-claim-btn{padding:0 18px;height:46px;border:none;border-radius:12px;background:var(--text);color:var(--bg);font-family:'Geist',sans-serif;font-size:14px;font-weight:600;-webkit-tap-highlight-color:transparent;transition:all .14s;white-space:nowrap}
.lb-claim-btn:active{transform:scale(.96)}
.lb-msg{font-size:11.5px;font-family:'Geist Mono',monospace;margin-top:6px;height:16px}
.lb-search-wrap{display:flex;gap:8px;margin-bottom:10px}
.lb-search-inp{flex:1;padding:11px 14px;background:var(--card);border:1px solid var(--border);border-radius:12px;font-family:'Geist',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none;box-shadow:var(--sh)}
.lb-search-inp:focus{border-color:rgba(99,102,241,.5)}
.lb-search-inp::placeholder{color:var(--t3)}
.lb-user-row{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:6px;box-shadow:var(--sh)}
.lb-user-avatar{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.lb-user-info{flex:1;min-width:0}
.lb-user-name{font-size:13.5px;font-weight:600}
.lb-user-sub{font-size:10.5px;color:var(--t3);font-family:'Geist Mono',monospace;margin-top:2px}
.lb-user-rank{font-size:13px;font-weight:700;font-family:'Geist Mono',monospace;color:var(--t3);flex-shrink:0}
.lb-rank-1{color:#f59e0b}.lb-rank-2{color:#94a3b8}.lb-rank-3{color:#c2835a}
.lb-add-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;font-family:'Geist',sans-serif;font-size:12px;font-weight:500;color:var(--t2);-webkit-tap-highlight-color:transparent;transition:all .14s}
.lb-add-btn:active{transform:scale(.94)}
.lb-req-row{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:6px;box-shadow:var(--sh)}
.lb-req-name{flex:1;font-size:13px;font-weight:500}
.lb-req-btns{display:flex;gap:6px}
.lb-req-accept{padding:6px 12px;border:none;border-radius:20px;background:#16a34a;color:#fff;font-family:'Geist',sans-serif;font-size:12px;font-weight:600;-webkit-tap-highlight-color:transparent}
.lb-req-decline{padding:6px 12px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--t2);font-family:'Geist',sans-serif;font-size:12px;-webkit-tap-highlight-color:transparent}
.lb-req-cancel{padding:6px 12px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--t3);font-family:'Geist',sans-serif;font-size:12px;-webkit-tap-highlight-color:transparent}
.lb-empty-note{font-size:12px;color:var(--t3);font-family:'Geist Mono',monospace;text-align:center;padding:20px 0}
.lb-signout-btn{width:100%;padding:12px;border:1px solid var(--border);border-radius:12px;background:transparent;font-family:'Geist',sans-serif;font-size:13px;color:var(--t3);-webkit-tap-highlight-color:transparent;transition:all .14s}
.lb-signout-btn:active{background:rgba(0,0,0,.04)}
.lb-streak-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-family:'Geist Mono',monospace;color:var(--t2);background:rgba(245,158,11,.12);padding:2px 8px;border-radius:20px;margin-top:6px}

/* LB TABS */
.lb-tabs{display:flex;background:rgba(0,0,0,.05);border-radius:12px;padding:3px;margin-bottom:18px;gap:2px}
.night .lb-tabs{background:rgba(255,255,255,.07)}
.lb-tab{flex:1;padding:8px;border-radius:9px;font-size:13px;font-weight:500;color:var(--t3);background:transparent;border:none;font-family:'Geist',sans-serif;transition:all .15s;-webkit-tap-highlight-color:transparent}
.lb-tab.act{background:var(--card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.lb-entry-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;box-shadow:var(--sh);display:flex;align-items:center;gap:0;overflow:hidden;padding:0}
.lb-entry-rank-stripe{width:4px;align-self:stretch;flex-shrink:0}
.lb-rank-stripe-1{background:linear-gradient(180deg,#f59e0b,#fbbf24)}.lb-rank-stripe-2{background:#94a3b8}.lb-rank-stripe-3{background:#c2835a}.lb-rank-stripe-n{background:var(--border)}
.lb-entry-body{flex:1;padding:12px 14px;min-width:0}
.lb-entry-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-entry-stat{font-size:11px;color:var(--t3);font-family:'Geist Mono',monospace}
.lb-entry-val{padding:0 16px;text-align:right;flex-shrink:0}
.lb-entry-num{font-size:20px;font-weight:700;font-family:'Geist Mono',monospace;color:var(--text)}
.lb-entry-unit{font-size:10px;color:var(--t3);font-family:'Geist Mono',monospace;display:block}
.lb-rank-badge{font-size:18px;padding:0 12px;flex-shrink:0}

/* AUTH SHEET */
#auth-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:300;pointer-events:none;transition:background .28s}
#auth-overlay.open{background:rgba(0,0,0,.38);pointer-events:auto}
.night #auth-overlay.open{background:rgba(0,0,0,.58)}
#auth-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:24px 24px 0 0;border:1px solid var(--border);border-bottom:none;z-index:301;transform:translateY(100%);transition:transform .34s cubic-bezier(.34,1.08,.64,1);padding:0 22px calc(var(--safe-b) + 28px);max-height:92vh;overflow-y:auto}
#auth-sheet.open{transform:translateY(0)}
.auth-tabs{display:flex;gap:2px;background:rgba(0,0,0,.05);border-radius:10px;padding:3px;margin-bottom:22px}
.night .auth-tabs{background:rgba(255,255,255,.07)}
.auth-tab{flex:1;padding:8px;border-radius:8px;font-size:13px;font-weight:500;color:var(--t3);background:transparent;border:none;font-family:'Geist',sans-serif;transition:all .15s;-webkit-tap-highlight-color:transparent}
.auth-tab.act{background:var(--card);color:var(--text);box-shadow:0 1px 6px rgba(0,0,0,.07)}
.auth-btn{width:100%;height:50px;border:none;border-radius:14px;margin-top:6px;font-family:'Geist',sans-serif;font-size:15px;font-weight:600;color:#fff;background:#6366f1;transition:all .15s;-webkit-tap-highlight-color:transparent}
.auth-btn:active{transform:scale(.97)}
.auth-err{font-size:12px;color:#ef4444;font-family:'Geist Mono',monospace;margin-top:8px;min-height:18px}
.auth-signed-in{text-align:center;padding:8px 0 4px}
.auth-signed-in-email{font-size:14px;color:var(--t2);margin-bottom:16px}

/* TOAST */
#toast{position:fixed;bottom:calc(var(--safe-b) + 100px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:500;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ANIMATIONS */
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.item-card{animation:fadeSlideUp .28s ease both}
.item-card:nth-child(2){animation-delay:.04s}.item-card:nth-child(3){animation-delay:.08s}.item-card:nth-child(4){animation-delay:.12s}.item-card:nth-child(5){animation-delay:.16s}.item-card:nth-child(n+6){animation-delay:.2s}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="bg-orbs"><div class="orb orb-a"></div><div class="orb orb-b"></div><div class="orb orb-c"></div></div>

<header id="app-header">
  <div class="app-logo">stream<span class="app-logo-dot">.</span><span class="companion-tag">companion</span></div>
  <div class="header-actions">
    <button class="hdr-btn" id="export-btn" onclick="handleExportBtn()" title="Export to cloud" style="display:none">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 16V4m0 0L8 8m4-4l4 4M4 20h16"/></svg>
    </button>
    <button class="hdr-btn" id="import-btn" onclick="handleImportBtn()" title="Import from cloud" style="display:none">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v12m0 0l-4-4m4 4l4-4M4 4h16"/></svg>
    </button>
    <button class="hdr-btn" id="sync-btn" title="Sync status">
      <div class="hdr-sync-dot" id="sync-dot"></div>
    </button>
    <button class="hdr-btn" onclick="openAuth()" title="Account">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </button>
    <button class="hdr-btn" onclick="toggleNight()">
      <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</header>

<div id="app">
<div id="pages-wrap">
  <!-- HOME -->
  <div class="page" id="page-home">
    <div class="home-greeting">
      <div class="greet-eyebrow" id="greet-eyebrow"></div>
      <div class="greet-text" id="greet-text"></div>
      <div class="greet-sub" id="greet-sub"></div>
    </div>
    <div id="home-feed"></div>
  </div>

  <!-- FOCUS -->
  <div class="page" id="page-focus">
    <div class="focus-page-hd">
      <div class="focus-page-title">Focus</div>
      <div class="focus-page-sub">stopwatch &amp; timer</div>
    </div>
    <div class="focus-tabs">
      <button class="focus-tab act" id="ftab-sw" onclick="focusTab('sw')">Stopwatch</button>
      <button class="focus-tab" id="ftab-ft" onclick="focusTab('ft')">Timer</button>
      <button class="focus-tab" id="ftab-pp" onclick="focusTab('pp')">Papers</button>
    </div>
    <!-- Stopwatch -->
    <div class="focus-panel act" id="fpanel-sw">
      <div class="sw-time-display" id="sw-disp">00:00<span class="sw-cs">.00</span></div>
      <div class="sw-status-lbl" id="sw-lbl">ready</div>
      <div class="sw-btns">
        <button class="sw-btn sw-secondary" id="sw-lap-btn" onclick="swLap()" style="opacity:.3">Lap</button>
        <button class="sw-btn sw-primary" id="sw-main-btn" onclick="swToggle()">Start</button>
        <button class="sw-btn sw-secondary" onclick="swReset()">Reset</button>
      </div>
      <div class="laps-list" id="sw-laps"></div>
      <button class="sw-log-btn" id="sw-log-btn" onclick="swStopAndLog()" style="display:none;width:100%">Stop &amp; Log Session</button>
    </div>
    <!-- Timer -->
    <div class="focus-panel" id="fpanel-ft">
      <div class="ring-outer">
        <svg class="ring-svg" viewBox="0 0 200 200">
          <circle cx="100" cy="100" r="86" fill="none" stroke="var(--border)" stroke-width="7"/>
          <circle cx="100" cy="100" r="86" fill="none" stroke="var(--text)" stroke-width="7"
            stroke-dasharray="540" stroke-dashoffset="540" id="ft-arc"
            stroke-linecap="round" transform="rotate(-90 100 100)" opacity=".78"/>
        </svg>
        <div class="ring-inner">
          <div class="ring-time" id="ft-time">25:00</div>
          <div class="ring-lbl" id="ft-lbl">focus</div>
        </div>
      </div>
      <div class="dur-row">
        <button class="dur-step" onclick="ftStep(-5)">−5</button>
        <div class="dur-val" id="ft-dur">25 min</div>
        <button class="dur-step" onclick="ftStep(5)">+5</button>
      </div>
      <button class="focus-cta" id="ft-main-btn" onclick="ftToggle()">Start Focus</button>
      <button class="focus-fs" onclick="openFullscreen()">
        <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 8V4h4M20 8V4h-4M4 16v4h4M20 16v4h-4"/></svg>
        Open fullscreen mode
      </button>
    </div>
    <!-- Papers panel -->
    <div class="focus-panel" id="fpanel-pp">
      <div class="sheet-heading" style="font-size:18px;margin-bottom:18px">Add Past Paper</div>
      <div class="field-row">
        <label class="field-lbl">Subject</label>
        <input class="field-inp" id="pp-subj" type="text" placeholder="e.g. Chemistry" autocomplete="off">
      </div>
      <div class="field-row">
        <label class="field-lbl">Paper / Type</label>
        <input class="field-inp" id="pp-paper" type="text" placeholder="e.g. Paper 1, Mock, Jun 2024" autocomplete="off">
      </div>
      <div class="field-row" style="display:flex;gap:10px">
        <div style="flex:1">
          <label class="field-lbl">Mark</label>
          <input class="field-inp" id="pp-mark" type="number" min="0" placeholder="45">
        </div>
        <div style="flex:1">
          <label class="field-lbl">Out of</label>
          <input class="field-inp" id="pp-total" type="number" min="1" placeholder="60">
        </div>
      </div>
      <button class="save-btn" style="background:#6366f1" onclick="ppSave()">Add Paper</button>
      <div id="pp-list" style="margin-top:22px"></div>
    </div>
    <!-- Study log (shown below all panels) -->
    <div id="focus-log-section" style="display:none">
      <div class="focus-log-hd">Study Log</div>
      <div id="focus-log-list"></div>
    </div>
  </div>

  <!-- CALENDAR -->
  <div class="page" id="page-cal">
    <div class="focus-page-hd">
      <div class="focus-page-title">Calendar</div>
      <div class="focus-page-sub">month · week · day</div>
    </div>
    <div class="cal-tabs">
      <button class="cal-tab act" id="cal-tab-month" onclick="calSetView('month')">Month</button>
      <button class="cal-tab" id="cal-tab-week" onclick="calSetView('week')">Week</button>
      <button class="cal-tab" id="cal-tab-day" onclick="calSetView('day')">Day</button>
    </div>
    <div id="cal-content"></div>
  </div>

  <!-- LEADERBOARD -->
  <div class="page" id="page-lb">
    <div class="focus-page-hd">
      <div class="focus-page-title">Board</div>
      <div class="focus-page-sub">friends &amp; stats</div>
    </div>

    <!-- My stats / claim username -->
    <div class="lb-section" id="lb-my-section"></div>

    <!-- Friends leaderboard -->
    <div class="lb-section">
      <div class="lb-section-title">Friends</div>
      <div id="lb-friends-list"></div>
    </div>

    <!-- Search -->
    <div class="lb-section">
      <div class="lb-section-title">Find friends</div>
      <div class="lb-search-wrap">
        <input class="lb-search-inp" id="lb-search-inp" type="text" placeholder="@username" autocomplete="off" oninput="lbSearchDebounced()">
      </div>
      <div id="lb-search-results"></div>
    </div>

    <!-- Incoming requests -->
    <div class="lb-section">
      <div class="lb-section-title">Requests</div>
      <div id="lb-requests"></div>
    </div>

    <!-- Sign out -->
    <div class="lb-section" id="lb-signout-section" style="display:none">
      <button class="lb-signout-btn" onclick="sbSignOutMobile()">Sign out</button>
    </div>
  </div>
</div><!-- /pages-wrap -->
</div><!-- /app -->

<!-- ADD SHEET -->
<div id="sheet-overlay" onclick="closeSheet()"></div>
<div id="add-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-step act" id="step-type">
    <div class="sheet-heading">What's on your mind?</div>

const SB_URL='https://wbbiqcdmkmydwshzvize.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndiYmlxY2Rta215ZHdzaHp2aXplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDc1MzMsImV4cCI6MjA4OTkyMzUzM30.EACRq05DU5NErRKl8NY6MvrQNnDv9HbgqGDIX5-Wan8';
const SB_DATA_KEYS=['st_r5','st_e5','st_l5','st_p5','st_x5','st_hw','st_mb1','st_name','st_ics','st_friends','st_deleted_ids'];
let sbUserId=null,sbAuthToken=null;

async function sbFetch(path,opts={}){
  const headers={'apikey':SB_KEY,'Content-Type':'application/json',...(sbAuthToken?{'Authorization':'Bearer '+sbAuthToken}:{}),...(opts.headers||{})};
  return fetch(SB_URL+path,{...opts,headers});
}

function _sbDirtyGet(){try{return JSON.parse(localStorage.getItem('sb_dirty')||'{}');}catch{return{};}}
function _sbDirtySet(o){try{localStorage.setItem('sb_dirty',JSON.stringify(o));}catch{}}
function _sbMarkDirty(k,ts){const d=_sbDirtyGet();d[k]=ts;_sbDirtySet(d);}
function _sbClearDirty(k,ts){const d=_sbDirtyGet();if(d[k]===ts){delete d[k];_sbDirtySet(d);}}

let _sbRetryTimer=null;
function _sbScheduleRetry(ms=3000){if(_sbRetryTimer)return;_sbRetryTimer=setTimeout(()=>{_sbRetryTimer=null;_sbReplayDirty();},ms);}

async function _sbPushKey(k,v,ts){
  if(!sbUserId)return false;
  try{
    const r=await sbFetch('/rest/v1/entries',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates'},body:JSON.stringify({user_id:sbUserId,key:k,value:JSON.stringify(v),updated_at:ts})});
    if(!r.ok)throw 0;
    const pts=JSON.parse(localStorage.getItem('sb_push_ts')||'{}');
    pts[k]=ts;localStorage.setItem('sb_push_ts',JSON.stringify(pts));
    _sbClearDirty(k,ts);return true;
  }catch{_sbScheduleRetry();return false;}
}

async function _sbReplayDirty(){
  if(!sbUserId)return;
  const d=_sbDirtyGet();
  for(const k of Object.keys(d)){
    const ts=d[k];const raw=localStorage.getItem(k);
    if(raw==null){_sbClearDirty(k,ts);continue;}
    let parsed;try{parsed=JSON.parse(raw);}catch{parsed=raw;}
    await _sbPushKey(k,parsed,ts);
  }
}

function _sbFlushOnHide(){
  if(!sbUserId||!sbAuthToken)return;
  const d=_sbDirtyGet();
  for(const k of Object.keys(d)){
    const ts=d[k];const raw=localStorage.getItem(k);if(raw==null)continue;
    try{fetch(SB_URL+'/rest/v1/entries',{method:'POST',keepalive:true,headers:{'apikey':SB_KEY,'Content-Type':'application/json','Authorization':'Bearer '+sbAuthToken,'Prefer':'resolution=merge-duplicates'},body:JSON.stringify({user_id:sbUserId,key:k,value:raw,updated_at:ts})});}catch{}
  }
}
window.addEventListener('pagehide',_sbFlushOnHide);
window.addEventListener('beforeunload',_sbFlushOnHide);
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')_sbFlushOnHide();});

async function sbSet(k,v){
  const ts=new Date().toISOString();
  _sbMarkDirty(k,ts); // mark dirty before login check so offline edits survive session restore
  if(!sbUserId)return;
  return _sbPushKey(k,v,ts);
}

function sv(k,v){
  localStorage.setItem(k,JSON.stringify(v));
  sbSet(k,v);
}

async function sbLoadAll(){
  if(!sbUserId)return null;
  try{
    const r=await sbFetch(`/rest/v1/entries?select=key,value,updated_at&user_id=eq.${sbUserId}`);
    if(!r.ok)return null;
    const rows=await r.json();
    const out={};
    rows.forEach(row=>{try{out[row.key]={data:JSON.parse(row.value),updated_at:row.updated_at};}catch{out[row.key]={data:row.value,updated_at:row.updated_at};}});
    return out;
  }catch{return null;}
}

async function sbSignIn(email,password){
  const r=await sbFetch('/auth/v1/token?grant_type=password',{method:'POST',body:JSON.stringify({email,password})});
  if(!r.ok){const e=await r.json();return{error:e.error_description||e.msg||'Invalid credentials'};}
  return await r.json();
}

  const r=await sbFetch('/auth/v1/signup',{method:'POST',body:JSON.stringify({email,password})});
  const d=await r.json();
  if(!r.ok)return{error:d.error_description||d.msg||'Sign up failed'};
  if(d.access_token)return d;
  return sbSignIn(email,password);

async function sbGetSession(){
  const stored=localStorage.getItem('sb_session');if(!stored)return null;
  try{
    const sess=JSON.parse(stored);
    if(sess.expires_at&&Date.now()/1000>sess.expires_at-60){
      const r=await sbFetch('/auth/v1/token?grant_type=refresh_token',{method:'POST',body:JSON.stringify({refresh_token:sess.refresh_token})});
      if(!r.ok){localStorage.removeItem('sb_session');return null;}
      const fresh=await r.json();localStorage.setItem('sb_session',JSON.stringify(fresh));return fresh;
    }
    return sess;
  }catch{return null;}
}

/* ─ Apply remote data (deleted_ids-aware, dirty-queue-aware) ─ */
function applyRemoteData(remote){
  if(!remote)return;
  const dirty=_sbDirtyGet();
  const get=(k)=>{if(dirty[k])return undefined;const v=remote[k];return v!==undefined?(v.data!==undefined?v.data:v):undefined;};

  // Apply remote deleted_ids first (union — never un-delete)
  const remDelRaw=remote['st_deleted_ids'];
  const remDel=remDelRaw?(remDelRaw.data!==undefined?remDelRaw.data:remDelRaw):undefined;
  if(remDel&&Array.isArray(remDel)&&!dirty['st_deleted_ids']){
    const localDel=getDeletedIds();
    let changed=false;
    remDel.forEach(id=>{if(!localDel.has(id)){localDel.add(id);changed=true;}});
    if(changed)localStorage.setItem('st_deleted_ids',JSON.stringify([...localDel]));
  }
  const deletedIds=getDeletedIds();

  function applyList(k,localKey){
    const v=get(k);if(v===undefined)return;
    const remArr=Array.isArray(v)?v:[];
    // Sticky done: preserve local done=true so remote stale pulls can't un-check items
    let localDoneIds=new Set();
    try{const loc=JSON.parse(localStorage.getItem(localKey)||'[]');loc.forEach(x=>{if(x&&x.done)localDoneIds.add(x.id);});}catch{}
    const merged=remArr
      .filter(item=>!deletedIds.has(item&&item.id))
      .map(item=>item?{...item,done:item.done||localDoneIds.has(item.id)}:item);
    localStorage.setItem(localKey,JSON.stringify(merged));
  }
  applyList('st_r5','st_r5');applyList('st_hw','st_hw');applyList('st_x5','st_x5');applyList('st_e5','st_e5');
  applyList('st_l5','st_l5');applyList('st_p5','st_p5');

  // Apply timetable/ICS data
  const icsRaw=get('st_ics');
  if(icsRaw!==undefined){
    const ics=typeof icsRaw==='string'?JSON.parse(icsRaw):icsRaw;
    localStorage.setItem('st_ics',JSON.stringify(ics));
  }

  const name=get('st_name');if(name)localStorage.setItem('st_name',name);

  // Friends union-merge
  const frRaw=remote['st_friends'];
  const fr=frRaw?(frRaw.data!==undefined?frRaw.data:frRaw):undefined;
  if(fr!==undefined){
    let lbFr=JSON.parse(localStorage.getItem('st_friends')||'[]');
    let changed=false;
    for(const f of(Array.isArray(fr)?fr:[])){if(f?.user_id&&!lbFr.some(m=>m.user_id===f.user_id)){lbFr.push(f);changed=true;}}
    if(changed)localStorage.setItem('st_friends',JSON.stringify(lbFr));
  }
}

async function sbSilentPull(){
  if(!sbUserId)return;
  try{
    const remote=await sbLoadAll();if(!remote||!Object.keys(remote).length)return;
    const localTs=JSON.parse(localStorage.getItem('sb_push_ts')||'{}');
    let changed=false;const filtered={};
    SB_DATA_KEYS.forEach(k=>{
      if(!remote[k])return;
      const remoteTs=remote[k].updated_at;const localT=localTs[k]||'';
      if(remoteTs>localT){filtered[k]=remote[k];changed=true;}
    });
    if(!changed)return;
    applyRemoteData(filtered);
    renderFeed();updateGreeting();
    if(curPage==='lb')renderLBPage();
    if(curPage==='cal')renderCalPage();
  }catch{}
}

async function sbPushAll(){
  if(!sbUserId)return;
  const keys=['st_r5','st_e5','st_l5','st_p5','st_x5','st_hw','st_mb1','st_deleted_ids'];
  for(const k of keys){const v=localStorage.getItem(k);if(v)await sbSet(k,JSON.parse(v));}
  const name=localStorage.getItem('st_name');if(name)await sbSet('st_name',name);
}

async function sbPushMissing(){
  if(!sbUserId)return;
  const pushed=JSON.parse(localStorage.getItem('sb_push_ts')||'{}');
  const skip=new Set(['st_friends']);
  for(const k of SB_DATA_KEYS){
    if(skip.has(k)||pushed[k])continue;
    const raw=localStorage.getItem(k);if(!raw)continue;
    let val;try{val=JSON.parse(raw);}catch{val=raw;}
    if(val===null||val===undefined)continue;
    if(Array.isArray(val)&&val.length===0)continue;
    if(typeof val==='object'&&!Array.isArray(val)&&Object.keys(val).length===0)continue;
    await sbSet(k,val);
  }
}

async function sbActivateSession(sess){
  sbAuthToken=sess.access_token;sbUserId=sess.user?.id;
  localStorage.setItem('sb_session',JSON.stringify(sess));
  await _sbReplayDirty();
  await sbPushMissing();
  const remote=await sbLoadAll();
  if(remote&&Object.keys(remote).length){applyRemoteData(remote);}
  else{await sbPushAll();}
  renderFeed();updateGreeting();
  setSyncStatus(true,sess.user?.email);
  closeAuth();
  showToast('Synced ✓');
  sbStartAutoSync();
  renderLBPage();
  lbFetchFriendsFromServer();
}

/* ═══════════════════════════════════════════════
   DATA LAYER (st_r5 / st_hw / st_x5 / st_e5)
═══════════════════════════════════════════════ */
const KEY_MAP={rem:'st_r5',hw:'st_hw',exam:'st_x5',event:'st_e5'};

function getDeletedIds(){
  try{return new Set(JSON.parse(localStorage.getItem('st_deleted_ids')||'[]'));}catch{return new Set();}
}
function addDeletedId(id){
  const ids=getDeletedIds();ids.add(id);
  sv('st_deleted_ids',[...ids]);
}

function getTypedList(type){
  try{return JSON.parse(localStorage.getItem(KEY_MAP[type])||'[]');}catch{return[];}
}

// Desktop uses different field names — normalise to what mobile expects
function normalizeItem(item,type){
  const out={...item,type};
  // title: desktop uses text (rem), task (hw), name (exam/event)
  if(!out.title){
    if(type==='rem')out.title=item.text||item.subj||'';
    else if(type==='hw')out.title=item.task||'';
    else if(type==='exam')out.title=item.name||(item.subj?item.subj+' exam':'');
    else if(type==='event')out.title=item.name||'';
  }
  // date: desktop uses ld (rem), due (hw)
  if(!out.date){
    if(type==='rem')out.date=item.ld||null;
    else if(type==='hw')out.date=item.due||null;
  }
  // subject: desktop uses subj
  if(!out.subject&&item.subj)out.subject=item.subj;
  // done: exams/events don't have done in desktop format
  if(out.done===undefined)out.done=false;
  return out;
}

function getItems(){
  // Returns the items actually displayed (filters past exams + auto-events)
  const deletedIds=getDeletedIds();
  const today=todayKey();
  const all=[];
  getTypedList('rem').forEach(x=>{if(x&&!deletedIds.has(x.id))all.push(normalizeItem(x,'rem'));});
  getTypedList('hw').forEach(x=>{if(x&&!deletedIds.has(x.id))all.push(normalizeItem(x,'hw'));});
  getTypedList('exam').forEach(x=>{if(x&&!deletedIds.has(x.id)&&(x.date||'')>=today)all.push(normalizeItem(x,'exam'));});
  getTypedList('event').forEach(x=>{if(x&&!deletedIds.has(x.id)&&!x.examId&&!x.hwId)all.push(normalizeItem(x,'event'));});
  return all;
}

function addItem(item){
  const key=KEY_MAP[item.type];
  const list=getTypedList(item.type);
  const id=Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  const created=Date.now();
  // Store in desktop-compatible field names so items created on mobile
  // display correctly on the desktop app too
  let stored;
  if(item.type==='rem'){
    stored={id,created,done:false,text:item.title,subj:item.subject||null,ld:item.date||null};
  }else if(item.type==='hw'){
    stored={id,created,done:false,task:item.title,subj:item.subject||null,due:item.date||null,link:null};
  }else if(item.type==='exam'){
    stored={id,created,done:false,name:item.title,subj:item.subject||item.title||'',date:item.date||null};
  }else if(item.type==='event'){
    stored={id,created,done:false,name:item.title,subj:item.subject||null,date:item.date||null};
  }else{
    stored={id,created,done:false,...item};delete stored.type;
  }
  list.push(stored);
  sv(key,list);
  return{...stored,type:item.type};
}

function toggleDone(id,type){
  const key=KEY_MAP[type];const list=getTypedList(type);
  const i=list.findIndex(x=>String(x.id)===String(id));
  if(i>=0){list[i].done=!list[i].done;sv(key,list);return list[i];}
  return null;
}

function deleteItem(id,type){
  const key=KEY_MAP[type];
  const list=getTypedList(type).filter(x=>x.id!==id);
  sv(key,list);
  addDeletedId(id);
}

   HOME FEED
═══════════════════════════════════════════════ */
const TYPE_META={
  rem:{label:'Reminder',accent:'acc-rem',pill:'pill-rem',color:'var(--c-rem)'},
  hw:{label:'Homework',accent:'acc-hw',pill:'pill-hw',color:'var(--c-hw)'},
  exam:{label:'Exam',accent:'acc-exam',pill:'pill-exam',color:'var(--c-exam)'},
  event:{label:'Event',accent:'acc-event',pill:'pill-event',color:'var(--c-event)'},
};

function todayKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function tomorrowKey(){const t=new Date();t.setDate(t.getDate()+1);return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');}
function localDateStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

// Returns the next occurrence date string >= fromDate for a (possibly recurring) event,
// or null if there is none. Used by both the calendar and home feed.
function getNextOccurrence(ev,fromDate){
  if(!ev.recur){return(ev.date&&ev.date>=fromDate)?ev.date:null;}
  const r=ev.recur;
  if(!r.start)return null;
  if(r.until&&r.until<fromDate)return null;
  const start=fromDate>r.start?fromDate:r.start;
  const d=new Date(start+'T12:00');
  for(let i=0;i<400;i++){
    const ds=localDateStr(d);
    if(r.until&&ds>r.until)return null;
    if(!(r.exceptions&&r.exceptions.includes(ds))){
      const dow=d.getDay();
      if(r.freq==='daily')return ds;
      if(r.freq==='monthly'){const sd=new Date(r.start+'T12:00');if(d.getDate()===sd.getDate())return ds;}
      else{const chk=r.freq==='weekdays'?[1,2,3,4,5]:(r.days&&r.days.length?r.days:[new Date(r.start+'T12:00').getDay()]);if(chk.includes(dow))return ds;}
    }
    d.setDate(d.getDate()+1);
  }
  return null;
}

function fmtDateLabel(ds){
  if(!ds)return'';
  const tk=todayKey(),tmk=tomorrowKey();
  if(ds===tk)return'Today';if(ds===tmk)return'Tomorrow';
  return new Date(ds+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',month:'short',day:'numeric'});
}

function sortByDate(arr){return arr.slice().sort((a,b)=>(a.date||'9999-99-99')>(b.date||'9999-99-99')?1:-1);}

function renderCard(item,showPill=false){
  const m=TYPE_META[item.type]||TYPE_META.rem;
  const today=todayKey();
  const isOverdue=item.date&&item.date<today&&!item.done&&(item.type==='rem'||item.type==='hw');
  const dl=isOverdue?'<span style="color:#ef4444;font-weight:600">Overdue</span>':fmtDateLabel(item.date)?`<span>${fmtDateLabel(item.date)}</span>`:'';
  const subj=item.subject?`<span>${escHtml(item.subject)}</span>`:'';
  const sep=(item.subject&&dl)?'<span style="opacity:.35">·</span>':'';
  const pill=showPill?`<span class="item-pill ${m.pill}">${m.label}</span>`:'';
  const hasCheck=item.type==='rem'||item.type==='hw';
  return `<div class="item-card${item.done?' done':''}" data-id="${item.id}" data-type="${item.type}" id="card-${item.id}">
    <div class="item-accent ${m.accent}"></div>
    <div class="item-body">
      <div class="item-title">${escHtml(item.title)}</div>
      <div class="item-meta">${pill}${subj}${sep}${dl}</div>
    </div>
    ${hasCheck?`<button class="item-check" onclick="checkItem('${item.id}','${item.type}')" title="Toggle done">
      ${item.done
        ?'<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>'
        :'<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/></svg>'
      }</button>`:''}
  </div>`;
}

function renderTypeSection(label,items,color){
  if(!items.length)return'';
  const active=items.filter(x=>!x.done);
  const done=items.filter(x=>x.done);
  if(!active.length&&!done.length)return'';
  return`<div class="type-section">
    <div class="type-sec-hd">
      <div class="type-sec-dot" style="background:${color}"></div>
      <span class="type-sec-label">${label}</span>
      <span class="sec-count" style="margin-left:auto">${active.length||done.length}</span>
    </div>
    ${active.map(x=>renderCard(x,false)).join('')}
    ${done.map(x=>renderCard(x,false)).join('')}
  </div>`;
}

function renderFeed(){
  const deletedIds=getDeletedIds();
  const today=todayKey();
  const feed=document.getElementById('home-feed');

  const rems=sortByDate(getTypedList('rem').filter(x=>x&&!deletedIds.has(x.id)).map(x=>normalizeItem(x,'rem')));
  const hws=sortByDate(getTypedList('hw').filter(x=>x&&!deletedIds.has(x.id)).map(x=>normalizeItem(x,'hw')));
  const exams=sortByDate(getTypedList('exam').filter(x=>x&&!deletedIds.has(x.id)&&(x.date||'')>=today).map(x=>normalizeItem(x,'exam')));
  const events=sortByDate(getTypedList('event').filter(x=>x&&!deletedIds.has(x.id)&&!x.examId&&!x.hwId).flatMap(x=>{
    const n=normalizeItem(x,'event');
    if(!n.recur)return[n];
    const next=getNextOccurrence(n,today);
    return next?[{...n,date:next}]:[];
  }));

  const hasActive=rems.filter(x=>!x.done).length||hws.filter(x=>!x.done).length||exams.length||events.length;

  if(!hasActive&&!rems.filter(x=>x.done).length&&!hws.filter(x=>x.done).length&&!exams.length&&!events.length){
    feed.innerHTML=`<div class="empty-wrap"><div class="empty-ring"><svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" d="M12 4v16m8-8H4"/></svg></div><div class="empty-title">Nothing here yet</div><div class="empty-sub">Tap <strong>+</strong> to add a reminder,<br>homework, exam or event.</div></div>`;
    return;
  }

  let html='';
  if(!hasActive){html=`<div class="empty-wrap"><div class="empty-ring"><svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg></div><div class="empty-title">All caught up</div><div class="empty-sub">Everything's done. Great work.</div></div>`;}
  html+=renderTypeSection('Reminders',rems,'var(--c-rem)');
  html+=renderTypeSection('Homework',hws,'var(--c-hw)');
  html+=renderTypeSection('Exams',exams,'var(--c-exam)');
  html+=renderTypeSection('Events',events,'var(--c-event)');
  feed.innerHTML=html;
  setupSwipe();
}

function toggleDoneSection(btn){

}

function checkItem(id,type){
  const result=toggleDone(id,type);

      ?'<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>'
      :'<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/></svg>';
  }
  updateGreeting();

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function setupSwipe(){
  document.querySelectorAll('.item-card').forEach(card=>{
    let sx=null,sy=null,swipeX=0;
    card.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;swipeX=0;},{passive:true});
    card.addEventListener('touchmove',e=>{
      if(sx===null)return;
      const dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;
      if(Math.abs(dy)>Math.abs(dx)*1.5){sx=null;return;}
      swipeX=dx;
      if(dx<-30){card.classList.add('swiping');card.style.transform=`translateX(${Math.min(0,dx+30)}px)`;}
      else{card.classList.remove('swiping');card.style.transform='';}
    },{passive:true});
    card.addEventListener('touchend',()=>{
      if(swipeX<-80){
        const id=card.dataset.id,type=card.dataset.type;
        card.style.transition='transform .22s ease,opacity .22s ease';
        card.style.transform='translateX(-110%)';card.style.opacity='0';
        setTimeout(()=>{deleteItem(id,type);renderFeed();updateGreeting();},220);
      }else{card.classList.remove('swiping');card.style.transform='';}
      sx=null;swipeX=0;
    });
    const checkBtn=card.querySelector('.item-check');
    if(checkBtn){
      checkBtn.addEventListener('touchend',e=>{
        if(Math.abs(swipeX)>5)return;
        e.stopPropagation();
        e.preventDefault();
        checkItem(card.dataset.id,card.dataset.type);
      },{passive:false});
    }
  });
}

   FOCUS — STOPWATCH
═══════════════════════════════════════════════ */
let _swRun=false,_swEl=0,_swTs=null,_swRaf=null,_swLaps=[];

function focusTab(t){
  ['sw','ft','pp'].forEach(x=>{
    document.getElementById('ftab-'+x)?.classList.toggle('act',t===x);
    document.getElementById('fpanel-'+x)?.classList.toggle('act',t===x);
  });
  if(t==='pp')ppRenderList();
  renderStudyLog();
}

function swToggle(){
  if(_swRun){_swEl+=Date.now()-_swTs;cancelAnimationFrame(_swRaf);_swRun=false;
    // Log completed stopwatch session if > 1 min
    if(_swEl>=60000)_logStudySession(Math.floor(_swEl/60000),'Stopwatch');
  }else{_swTs=Date.now();_swRaf=requestAnimationFrame(_swTick);_swRun=true;}
  swUI();
}
function _swTick(){if(!_swRun)return;swRender(_swEl+(Date.now()-_swTs));_swRaf=requestAnimationFrame(_swTick);}
function swLap(){if(!_swRun)return;_swLaps.push(_swEl+(Date.now()-_swTs));swRenderLap();}
function swReset(){cancelAnimationFrame(_swRaf);_swRun=false;_swEl=0;_swTs=null;_swLaps=[];swRender(0);swUI();const c=document.getElementById('sw-laps');if(c)c.innerHTML='';}
function swStopAndLog(){
  if(!_swRun&&_swEl===0)return;
  if(_swRun){_swEl+=Date.now()-_swTs;cancelAnimationFrame(_swRaf);_swRun=false;}
  const mins=Math.max(1,Math.round(_swEl/60000));
  _logStudySession(mins,'Study Session');
  showToast(`${mins} min logged ✓`);
  swReset();
  renderStudyLog();
}
function swFmt(ms,full=false){const m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000),cs=Math.floor((ms%1000)/10);return full?`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`:`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;}
function swRender(ms){const m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000),cs=Math.floor((ms%1000)/10);const el=document.getElementById('sw-disp');if(el)el.innerHTML=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}<span class="sw-cs">.${String(cs).padStart(2,'0')}</span>`;}
function swRenderLap(){const c=document.getElementById('sw-laps');if(!c)return;const i=_swLaps.length,prev=i>1?_swLaps[i-2]:0,diff=_swLaps[i-1]-prev;c.insertAdjacentHTML('afterbegin',`<div class="lap-row"><span class="lap-n">Lap ${i}</span><span class="lap-t">${swFmt(diff,true)}</span></div>`);}
function swUI(){
  const btn=document.getElementById('sw-main-btn'),lap=document.getElementById('sw-lap-btn'),lbl=document.getElementById('sw-lbl');
  if(btn)btn.textContent=_swRun?'Pause':(_swEl>0?'Resume':'Start');
  if(lap)lap.style.opacity=_swRun?'1':'0.3';
  if(lbl)lbl.textContent=_swRun?'running':(_swEl>0?'paused':'ready');
  const logBtn=document.getElementById('sw-log-btn');
  if(logBtn)logBtn.style.display=_swEl>0?'block':'none';
}

/* ═══════════════════════════════════════════════
   FOCUS — TIMER
═══════════════════════════════════════════════ */
let _ftDur=25,_ftTotal=25*60000,_ftRem=25*60000,_ftRun=false,_ftTs=null,_ftRaf=null;

function ftStep(d){if(_ftRun)return;_ftDur=Math.max(5,Math.min(120,_ftDur+d));_ftTotal=_ftDur*60000;_ftRem=_ftTotal;ftRender();}
function ftToggle(){
  if(_ftRun){_ftRem-=Date.now()-_ftTs;cancelAnimationFrame(_ftRaf);_ftRun=false;}
  else{if(_ftRem<=0)_ftRem=_ftTotal;_ftTs=Date.now();_ftRaf=requestAnimationFrame(_ftTick);_ftRun=true;}
  ftRender();
}
function _ftTick(){
  if(!_ftRun)return;
  const rem=Math.max(0,_ftRem-(Date.now()-_ftTs));
  ftRenderTime(rem);
  if(rem<=0){_ftRem=0;_ftRun=false;ftRender();ftComplete();return;}
  _ftRaf=requestAnimationFrame(_ftTick);
}
function ftComplete(){
  ftChime();
  _logStudySession(_ftDur,'Focus Session');
  showToast(`${_ftDur} min focus logged ✓`);
}
function ftRenderTime(rem){
  const m=Math.floor(rem/60000),s=Math.floor((rem%60000)/1000);
  const el=document.getElementById('ft-time');if(el)el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const arc=document.getElementById('ft-arc');if(arc)arc.setAttribute('stroke-dashoffset',540*(1-rem/_ftTotal));
}
function ftRender(){
  ftRenderTime(_ftRem);
  const d=document.getElementById('ft-dur');if(d)d.textContent=`${_ftDur} min`;
  const btn=document.getElementById('ft-main-btn');if(btn)btn.textContent=_ftRun?'Pause':(_ftRem<_ftTotal&&_ftRem>0?'Resume':'Start Focus');
  document.querySelectorAll('.dur-step').forEach(b=>b.style.opacity=_ftRun?'0.3':'1');
  const lbl=document.getElementById('ft-lbl');if(lbl)lbl.textContent=_ftRem<=0?'done ✦':'focus';
}
function openFullscreen(){
  const el=document.documentElement;
  if(el.requestFullscreen)el.requestFullscreen().catch(()=>{});
  else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
}

function ftChime(){
  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[0,.15,.3].forEach((t,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=[523,659,784][i];o.type='sine';g.gain.setValueAtTime(0,ctx.currentTime+t);g.gain.linearRampToValueAtTime(.18,ctx.currentTime+t+.02);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.6);o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.6);});}catch{}
}

/* ─ Log a study session to st_l5 ─ */
function _logStudySession(mins,subj){
  if(mins<=0)return;

function lbGetWeekKey(){const d=new Date(),jan1=new Date(d.getFullYear(),0,1),wk=Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7);return`${d.getFullYear()}-W${wk}`;}

function lbUpdateStreak(){
  const today=new Date().toISOString().split('T')[0];
  let s=JSON.parse(localStorage.getItem('st_lb_streak')||'{"count":0,"last":""}');
  if(s.last===today)return;
  const yesterday=new Date(Date.now()-86400000).toISOString().split('T')[0];
  s.count=s.last===yesterday?s.count+1:1;s.last=today;
  localStorage.setItem('st_lb_streak',JSON.stringify(s));
}
function lbGetStreak(){
  const s=JSON.parse(localStorage.getItem('st_lb_streak')||'{"count":0,"last":""}');
  const yesterday=new Date(Date.now()-86400000).toISOString().split('T')[0];
  const today=new Date().toISOString().split('T')[0];
  if(s.last!==today&&s.last!==yesterday)return 0;return s.count||0;
}
function lbUpdateWeekly(addMins){
  const wk=lbGetWeekKey();
  let w=JSON.parse(localStorage.getItem('st_lb_weekly')||'{}');
  if(w.weekKey!==wk)w={weekKey:wk,studyMins:0,papers:[]};
  w.studyMins+=addMins;localStorage.setItem('st_lb_weekly',JSON.stringify(w));
}
function lbGetWeeklyStats(){
  const wk=lbGetWeekKey();const w=JSON.parse(localStorage.getItem('st_lb_weekly')||'{}');
  if(w.weekKey!==wk)return{weekKey:wk,studyMins:0,weeklyAvg:0,weeklyPapers:0};
  return{weekKey:wk,studyMins:w.studyMins||0,weeklyAvg:0,weeklyPapers:0};
}
function lbGetMyStats(){
  let papers=[],logs=[];
  try{papers=JSON.parse(localStorage.getItem('st_p5')||'[]');}catch{}
  try{logs=JSON.parse(localStorage.getItem('st_l5')||'[]');}catch{}
  const avg=papers.length?papers.reduce((a,b)=>a+b.mark/b.total*100,0)/papers.length:0;
  const totalMins=logs.reduce((a,b)=>a+(b.mins||0),0);
  const weekly=lbGetWeeklyStats();const streak=lbGetStreak();
  const emoji=localStorage.getItem('st_lb_emoji')||'';
  return{avg:+avg.toFixed(1),paperCount:papers.length,studyMins:totalMins,streak,emoji,weeklyStudyMins:weekly.studyMins,weeklyAvg:weekly.weeklyAvg,weeklyPapers:weekly.weeklyPapers,weekKey:weekly.weekKey};
}

async function lbPublish(){
  if(!sbUserId)return false;
  const username=localStorage.getItem('st_lb_username');if(!username)return false;

}

async function lbFetchFriendStats(friends){
  if(!friends.length)return[];
  const ids=friends.map(f=>`"${f.user_id}"`).join(',');
  try{const r=await sbFetch(`/rest/v1/leaderboard?user_id=in.(${ids})&select=user_id,username,stats,updated_at`);if(r.ok)return await r.json();}catch{}
  return[];

async function lbFetchFriendsFromServer(){
  if(!sbUserId)return false;
  let lbFr=JSON.parse(localStorage.getItem('st_friends')||'[]');
  try{
    const[outR,inR]=await Promise.all([
      sbFetch(`/rest/v1/friend_requests?from_id=eq.${sbUserId}&status=eq.accepted&select=to_id,to_username`),
      sbFetch(`/rest/v1/friend_requests?to_id=eq.${sbUserId}&status=eq.accepted&select=from_id,from_username`)
    ]);
    const out=outR.ok?await outR.json():[];const inc=inR.ok?await inR.json():[];
    const fromServer=[...out.filter(r=>r.to_id).map(r=>({user_id:r.to_id,username:r.to_username})),...inc.filter(r=>r.from_id).map(r=>({user_id:r.from_id,username:r.from_username}))];
    let changed=false;
    for(const f of fromServer){if(!lbFr.some(m=>m.user_id===f.user_id)){lbFr.push(f);changed=true;}}
    if(changed){localStorage.setItem('st_friends',JSON.stringify(lbFr));}
    if(curPage==='lb')renderLBPage();
    return changed;
  }catch{return false;}
}
